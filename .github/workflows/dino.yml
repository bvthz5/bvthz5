name: Generate Dino Contribution Animation

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - main
    paths:
      - 'scripts/generate_dino.js'
      - '.github/workflows/dino.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Dino Animation SVG
        run: node scripts/generate_dino.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dino.svg
          git diff-index --quiet HEAD || git commit -m "chore: update dino contribution animation"
          git push
