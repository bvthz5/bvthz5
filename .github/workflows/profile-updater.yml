name: Unified Profile Auto-Updater

on:
  schedule:
    # Runs every hour
    - cron: "0 * * * *"
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - '.github/workflows/profile-updater.yml'

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Dino Animation Generator
        run: node scripts/generate_dino.js

      - name: Run Tech Trends Updater
        run: node scripts/update_trends.js

      - name: Run Followers Updater
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_followers.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dino.svg assets/trends.svg README.md
          git diff-index --quiet HEAD || git commit -m "chore: hourly profile auto-update (dino, trends, followers)"
          git push
