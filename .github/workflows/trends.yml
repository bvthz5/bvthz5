name: Auto-Update Tech Focus & Learning Trends

on:
  schedule:
    - cron: "0 12 * * *" # Runs daily at noon UTC
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - main
    paths:
      - 'scripts/update_trends.js'
      - '.github/workflows/trends.yml'

jobs:
  update-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Trends and Update README
        run: node scripts/update_trends.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/trends.svg README.md
          git diff-index --quiet HEAD || git commit -m "chore: auto-update learning path tech trends"
          git push
