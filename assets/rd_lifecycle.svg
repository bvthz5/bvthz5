<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for Cards -->
    <linearGradient id="grad-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b927fc"/>
      <stop offset="100%" stop-color="#fbc2eb"/>
    </linearGradient>
    <linearGradient id="grad-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff758c"/>
      <stop offset="100%" stop-color="#ff7eb3"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
  </defs>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #ffffff; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 10px; fill: #8b949e; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    .item { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; fill: #c9d1d9; }
    .arrow { stroke: #30363d; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
  </style>

  <!-- Card 1 -->
  <rect x="10" y="10" width="190" height="190" rx="12" fill="#0d1117" stroke="url(#grad-cyan)" stroke-width="2" />
  <text x="30" y="45" class="subtitle" fill="url(#grad-cyan)">Phase 01</text>
  <text x="30" y="70" class="title">Research &amp; Capture</text>
  <circle cx="35" cy="110" r="4" fill="#00f2fe" />
  <text x="50" y="114" class="item">EEG Brain Signals</text>
  <circle cx="35" cy="140" r="4" fill="#00f2fe" />
  <text x="50" y="144" class="item">Artifact Filtering</text>
  <circle cx="35" cy="170" r="4" fill="#00f2fe" />
  <text x="50" y="174" class="item">Feature Extraction</text>

  <!-- Arrow 1 -->
  <path d="M 210 105 L 235 105" class="arrow" />
  <path d="M 230 100 L 236 105 L 230 110" stroke="#30363d" stroke-width="2" fill="none" />

  <!-- Card 2 -->
  <rect x="245" y="10" width="190" height="190" rx="12" fill="#0d1117" stroke="url(#grad-purple)" stroke-width="2" />
  <text x="265" y="45" class="subtitle" fill="url(#grad-purple)">Phase 02</text>
  <text x="265" y="70" class="title">Cognitive Logic</text>
  <circle cx="270" cy="110" r="4" fill="#b927fc" />
  <text x="285" y="114" class="item">RAG Systems</text>
  <circle cx="270" cy="140" r="4" fill="#b927fc" />
  <text x="285" y="144" class="item">Agent Frameworks</text>
  <circle cx="270" cy="170" r="4" fill="#b927fc" />
  <text x="285" y="174" class="item">Semantic Memory</text>

  <!-- Arrow 2 -->
  <path d="M 445 105 L 470 105" class="arrow" />
  <path d="M 465 100 L 471 105 L 465 110" stroke="#30363d" stroke-width="2" fill="none" />

  <!-- Card 3 -->
  <rect x="480" y="10" width="190" height="190" rx="12" fill="#0d1117" stroke="url(#grad-pink)" stroke-width="2" />
  <text x="500" y="45" class="subtitle" fill="url(#grad-pink)">Phase 03</text>
  <text x="500" y="70" class="title">Neural Training</text>
  <circle cx="505" cy="110" r="4" fill="#ff758c" />
  <text x="520" y="114" class="item">Time-Series ML</text>
  <circle cx="505" cy="140" r="4" fill="#ff758c" />
  <text x="520" y="144" class="item">Transformer Models</text>
  <circle cx="505" cy="170" r="4" fill="#ff758c" />
  <text x="520" y="174" class="item">Signal Classification</text>

  <!-- Arrow 3 -->
  <path d="M 680 105 L 705 105" class="arrow" />
  <path d="M 700 100 L 706 105 L 700 110" stroke="#30363d" stroke-width="2" fill="none" />

  <!-- Card 4 -->
  <rect x="715" y="10" width="190" height="190" rx="12" fill="#0d1117" stroke="url(#grad-green)" stroke-width="2" />
  <text x="735" y="45" class="subtitle" fill="url(#grad-green)">Phase 04</text>
  <text x="735" y="70" class="title">Swarm Execution</text>
  <circle cx="740" cy="110" r="4" fill="#43e97b" />
  <text x="755" y="114" class="item">UAV Flight API</text>
  <circle cx="740" cy="140" r="4" fill="#43e97b" />
  <text x="755" y="144" class="item">Realtime Telemetry</text>
  <circle cx="740" cy="170" r="4" fill="#43e97b" />
  <text x="755" y="174" class="item">Swarm Control</text>
</svg>
