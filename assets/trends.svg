    <text x="50" y="55" class="heading-label">Market Focus &amp; Trends</text>
    <text x="750" y="55" class="heading-label" text-anchor="end">03 / 03</text>
    <text x="50" y="85" class="title-text">Java News Roundup: Value Objects, WildFly 41,</text>
    <text x="50" y="108" class="title-text" font-size="18" opacity="0.8">TornadoVM, LangChain4j, Oracle AI Agent Studio</text>
    
