<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BV Bot — bvthz5 Repository Assistant</title>
    <meta name="description" content="An intelligent chatbot that knows everything about the bvthz5 GitHub repository. Ask about projects, skills, stats, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background particles -->
    <canvas id="particles-canvas"></canvas>

    <!-- Main container -->
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="bot-avatar">
                    <div class="avatar-ring"></div>
                    <span class="avatar-icon">🤖</span>
                    <span class="status-dot"></span>
                </div>
                <div class="header-info">
                    <h1>BV Bot</h1>
                    <p class="subtitle">bvthz5 Repository Assistant</p>
                </div>
            </div>
            <div class="header-right">
                <a href="https://github.com/bvthz5" target="_blank" class="github-link" title="View GitHub Profile">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
                <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Chat messages area -->
        <main class="chat-messages" id="chat-messages">
            <!-- Welcome message -->
            <div class="message bot-message welcome-message" id="welcome-msg">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <p class="greeting">Hey there! 👋 I'm <strong>BV Bot</strong></p>
                        <p>I know everything about the <strong>bvthz5</strong> repository. Ask me about:</p>
                        <div class="suggestion-chips">
                            <button class="chip" data-query="What skills and tools does bvthz5 use?">🛠️ Skills & Tools</button>
                            <button class="chip" data-query="Tell me about bvthz5's GitHub stats">📊 GitHub Stats</button>
                            <button class="chip" data-query="What projects are in this repository?">📂 Projects</button>
                            <button class="chip" data-query="What certifications does bvthz5 have?">📜 Certifications</button>
                            <button class="chip" data-query="What is bvthz5 currently learning?">🌱 Learning Path</button>
                            <button class="chip" data-query="Tell me about the research publications">🧠 Research</button>
                            <button class="chip" data-query="How can I connect with bvthz5?">🌍 Connect</button>
                            <button class="chip" data-query="What coding platforms is bvthz5 on?">🏆 Coding Profiles</button>
                        </div>
                    </div>
                    <span class="message-time">Just now</span>
                </div>
            </div>
        </main>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typing-indicator">
            <div class="message-avatar">🤖</div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input area -->
        <footer class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask me anything about this repo..." autocomplete="off" autofocus>
                <button id="send-btn" class="send-button" title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Powered by local knowledge base • No API keys needed</p>
        </footer>
    </div>

    <script src="knowledge-base.js"></script>
    <script src="chat-engine.js"></script>
    <script src="particles.js"></script>
</body>
</html>
